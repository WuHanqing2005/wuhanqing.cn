<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Redirect</title>
    <style>
        :root {
            --bg: #000;
            --fg: #fff;
            --muted: rgba(255, 255, 255, 0.86);
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
        }

        .gateway {
            position: relative;
            height: 100%;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.12), transparent 58%),
                #000;
        }

        .gateway::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.03) 0,
                rgba(255, 255, 255, 0.03) 1px,
                transparent 1px,
                transparent 3px
            );
            opacity: 0.35;
        }

        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: "Arial Black", "Segoe UI", sans-serif;
            padding: 5vmin;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 0 46px rgba(255, 255, 255, 0.12);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(34px, 7vw, 88px);
            line-height: 0.95;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.22);
        }

        .hero p {
            margin: 14px 0 0;
            font-size: clamp(20px, 3.2vw, 40px);
            font-weight: 800;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-shadow: 0 0 16px rgba(255, 255, 255, 0.18);
        }

        .type-line {
            display: inline-block;
            white-space: nowrap;
        }

        .caret {
            display: inline-block;
            width: 0.5ch;
            margin-left: 0.14ch;
            border-right: 2px solid var(--fg);
            vertical-align: -0.05em;
            animation: blink 620ms step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
    <script>
        (function () {
            var locale = String((navigator.languages && navigator.languages[0]) || navigator.language || 'en').toLowerCase();
            var code = locale.slice(0, 2);
            var lang = (code === 'zh' || code === 'ko' || code === 'ja' || code === 'de') ? code : 'en';
            var base = 'https://wuhanqing.cn/wordpress/';
            var target = lang === 'zh' ? base : (base + '?lang=' + lang);
            // 过渡页最短展示时长（毫秒）: 数值越大，过渡动画看得越完整。
            var MIN_VIEW_MS = 200;
            // 打字速度修改位置（毫秒）: 数值越大打字越慢。
            var TYPE_SPEED_H1_MS = 25;
            var TYPE_SPEED_P_MS = 25;
            var TYPE_START_DELAY_MS = 10;

            function redirectNow() {
                window.location.replace(target);
            }

            function redirectAfterFirstPaint() {
                requestAnimationFrame(function () {
                    startTypewriter();
                    setTimeout(redirectNow, MIN_VIEW_MS);
                });
            }

            function typeText(el, text, stepMs, done) {
                var i = 0;
                function tick() {
                    if (!el) return;
                    el.textContent = text.slice(0, i);
                    i += 1;
                    if (i <= text.length) {
                        setTimeout(tick, stepMs);
                    } else if (done) {
                        done();
                    }
                }
                tick();
            }

            function startTypewriter() {
                var h1 = document.getElementById('type-h1');
                var p = document.getElementById('type-p');
                var c1 = document.getElementById('caret-h1');
                var c2 = document.getElementById('caret-p');
                var line1 = "HI, I'M WUHANQING";
                var line2 = 'WELCOME TO MY WEBSITE';
                if (!h1 || !p || !c1 || !c2) return;

                h1.textContent = '';
                p.textContent = '';
                c1.style.display = 'inline-block';
                c2.style.display = 'none';

                setTimeout(function () {
                    typeText(h1, line1, TYPE_SPEED_H1_MS, function () {
                        c1.style.display = 'none';
                        c2.style.display = 'inline-block';
                        typeText(p, line2, TYPE_SPEED_P_MS, function () {
                            c2.style.display = 'none';
                        });
                    });
                }, TYPE_START_DELAY_MS);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', redirectAfterFirstPaint, { once: true });
            } else {
                redirectAfterFirstPaint();
            }
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=https://wuhanqing.cn/wordpress/">
    </noscript>
</head>
<body>
    <main class="gateway" aria-label="Redirecting">
        <section class="hero">
            <h1><span id="type-h1" class="type-line">HI, I'M WUHANQING</span><span id="caret-h1" class="caret"></span></h1>
            <p><span id="type-p" class="type-line">WELCOME TO MY WEBSITE</span><span id="caret-p" class="caret" style="display:none"></span></p>
        </section>
    </main>
</body>
</html>
