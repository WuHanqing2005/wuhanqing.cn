<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <link rel="dns-prefetch" href="//ipwho.is">
    <link rel="dns-prefetch" href="//ipapi.co">
    <link rel="preconnect" href="https://ipwho.is" crossorigin>
    <link rel="preconnect" href="https://ipapi.co" crossorigin>
    <title>Routing Gateway</title>
    <script>
        (function () {
            var MAIN_HOST = 'wuhanqing.cn';
            var CACHE_KEY = 'geo_country_cache_v3';
            var CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000;
            var PER_API_TIMEOUT_MS = 320;
            var GLOBAL_TIMEOUT_MS = 420;
            var redirected = false;

            function getLangFromCountry(countryCode) {
                var code = String(countryCode || '').toUpperCase();
                if (code === 'CN' || code === 'HK' || code === 'MO' || code === 'TW') return 'zh';
                if (code === 'KR' || code === 'KP') return 'ko';
                if (code === 'JP') return 'ja';
                if (code === 'DE' || code === 'AT' || code === 'CH') return 'de';
                return 'en';
            }

            function getCountryFromNavigator() {
                var locale = String(navigator.language || '').toLowerCase();
                if (locale.indexOf('zh') === 0) return 'CN';
                if (locale.indexOf('ko') === 0) return 'KR';
                if (locale.indexOf('ja') === 0) return 'JP';
                if (locale.indexOf('de') === 0) return 'DE';
                return 'US';
            }

            function buildTargetUrl(countryCode) {
                var lang = getLangFromCountry(countryCode);
                return lang === 'zh'
                    ? ('https://' + MAIN_HOST + '/wordpress')
                    : ('https://' + MAIN_HOST + '/wordpress/?lang=' + encodeURIComponent(lang));
            }

            function readCachedCountry() {
                try {
                    var raw = localStorage.getItem(CACHE_KEY);
                    if (!raw) return null;
                    var data = JSON.parse(raw);
                    if (!data || !data.country || !data.ts) return null;
                    if ((Date.now() - Number(data.ts)) > CACHE_TTL_MS) return null;
                    return String(data.country).toUpperCase();
                } catch (e) {
                    return null;
                }
            }

            function cacheCountry(countryCode) {
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        country: String(countryCode || '').toUpperCase(),
                        ts: Date.now()
                    }));
                } catch (e) {
                    // ignore
                }
            }

            function fastRedirect(countryCode) {
                if (redirected) return;
                redirected = true;
                window.location.replace(buildTargetUrl(countryCode));
            }

            function fetchJsonWithTimeout(url, timeoutMs) {
                var controller = new AbortController();
                var timer = setTimeout(function () { controller.abort(); }, timeoutMs);
                return fetch(url, {
                    signal: controller.signal,
                    cache: 'no-store',
                    mode: 'cors'
                })
                    .then(function (res) {
                        if (!res.ok) throw new Error('status');
                        return res.json();
                    })
                    .finally(function () {
                        clearTimeout(timer);
                    });
            }

            function normalizeCountry(raw) {
                if (!raw || typeof raw !== 'object') return null;
                var cc = raw.country_code || raw.countryCode || raw.country;
                if (!cc) return null;
                cc = String(cc).trim().toUpperCase();
                return cc.length === 2 ? cc : null;
            }

            function resolveCountryByIP() {
                var ipwho = fetchJsonWithTimeout('https://ipwho.is/', PER_API_TIMEOUT_MS)
                    .then(normalizeCountry);
                var ipapi = fetchJsonWithTimeout('https://ipapi.co/json/', PER_API_TIMEOUT_MS)
                    .then(normalizeCountry);

                return Promise.race([
                    Promise.any([ipwho, ipapi]).then(function (country) {
                        if (!country) throw new Error('empty-country');
                        return country;
                    }),
                    new Promise(function (resolve) {
                        setTimeout(function () {
                            resolve(getCountryFromNavigator());
                        }, GLOBAL_TIMEOUT_MS);
                    })
                ]).catch(function () {
                    return getCountryFromNavigator();
                });
            }

            var path = String(window.location.pathname || '');
            if (path.indexOf('/wordpress') === 0 || path.indexOf('/wp-') === 0 || path.indexOf('/wp-admin') === 0) {
                return;
            }

            var cachedCountry = readCachedCountry();
            if (cachedCountry) {
                fastRedirect(cachedCountry);
                return;
            }

            resolveCountryByIP().then(function (country) {
                cacheCountry(country);
                fastRedirect(country);
            });

            // 保底：任何异常都立即按浏览器语言跳转，绝不长时间停留在网关页。
            setTimeout(function () {
                fastRedirect(getCountryFromNavigator());
            }, GLOBAL_TIMEOUT_MS + 120);
        })();
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #040b18;
            color: #d9e3f0;
            font: 600 14px/1.4 "Consolas", "Courier New", monospace;
        }

        .hint {
            opacity: 0.75;
            letter-spacing: 1.2px;
        }
    </style>
</head>
<body>
    <div class="hint">ROUTING...</div>
</body>
</html>
