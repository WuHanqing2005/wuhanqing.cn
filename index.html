<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <link rel="dns-prefetch" href="//ipapi.co">
    <link rel="dns-prefetch" href="//ipwho.is">
    <link rel="dns-prefetch" href="//ipinfo.io">
    <link rel="preconnect" href="https://ipapi.co" crossorigin>
    <link rel="preconnect" href="https://ipwho.is" crossorigin>
    <link rel="preconnect" href="https://ipinfo.io" crossorigin>
    <title>Routing Service | Cyber Security</title>
    <style>
        :root {
            /* 高级暗色调配色 */
            --bg-dark: #050a18;
            --glass-bg: rgba(10, 20, 40, 0.7);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-main: #e0e6ed;
            --accent-green: #00ffaa;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; /* 科技感字体 */
            background: radial-gradient(circle at center, #102a43 0%, #050a18 100%);
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        /* 动态科技背景光晕 */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(157, 80, 187, 0.05) 0%, transparent 50%);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-25%, -25%); }
            100% { transform: translate(0%, 0%); }
        }

        .glass-panel {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 50px;
            width: 90%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* 扫描线效果 */
        .glass-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-blue);
            border-right: 2px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        h2 { 
            margin: 0; 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .status-msg { opacity: 0.6; font-size: 13px; margin-top: 10px; }

        .info-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dotted rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 25px;
            margin: 30px 0;
            text-align: left;
        }

        .info-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-size: 13px;
        }

        .label { color: rgba(255, 255, 255, 0.4); text-transform: uppercase; }
        .value { color: var(--accent-green); text-shadow: 0 0 5px rgba(0, 255, 170, 0.3); }

        .footer { font-size: 11px; color: rgba(255, 255, 255, 0.3); margin-top: 25px; }
        a { color: var(--neon-purple); text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }

    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="loader"></div>
        <h2>Secure Routing</h2>
        <p class="status-msg">Analyzing environment and bypassing nodes...</p>
        
        <div class="info-card">
            <div class="info-item"><span class="label">User IP:</span><span class="value" id="ip-val">FETCHING...</span></div>
            <div class="info-item"><span class="label">Geo Loc:</span><span class="value" id="loc-val">LOCATING...</span></div>
            <div class="info-item"><span class="label">Gateway:</span><span class="value" id="host-val">CALCULATING...</span></div>
            <div class="info-item"><span class="label">Standard:</span><span class="value" id="lang-val">MATCHING...</span></div>
        </div>

        <div class="footer">
            UPLINK TO: <a id="fallback-link" href="#">INITIALIZING...</a>
        </div>
    </div>

    <script>
        (function () {
            const MAIN_HOST = 'wuhanqing.cn';
            const TEST_IP = '';
            const CACHE_KEY = 'geo_country_cache_v2';
            const CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000;
            const PER_API_TIMEOUT_MS = 650;
            const GLOBAL_TIMEOUT_MS = 900;
            const ULTRA_FAST_MODE = true;
            let redirected = false;

            function getLangFromCountry(countryCode) {
                const code = (countryCode || '').toUpperCase();
                if (['CN', 'HK', 'MO', 'TW'].includes(code)) return 'zh';
                if (['KR', 'KP'].includes(code)) return 'ko';
                if (code === 'JP') return 'ja';
                if (['DE', 'AT', 'CH'].includes(code)) return 'de';
                return 'en';
            }

            function getCountryFromNavigator() {
                const locale = (navigator.language || '').toLowerCase();
                if (locale.startsWith('zh')) return 'CN';
                if (locale.startsWith('ko')) return 'KR';
                if (locale.startsWith('ja')) return 'JP';
                if (locale.startsWith('de')) return 'DE';
                return 'US';
            }

            function buildTargetFromCountry(countryCode) {
                const lang = getLangFromCountry(countryCode);
                let url = 'https://' + MAIN_HOST + '/wordpress';
                if (lang !== 'zh') {
                    url += '/?lang=' + encodeURIComponent(lang);
                }
                return { url, lang };
            }

            function safeSetText(id, value) {
                const el = document.getElementById(id);
                if (el) el.innerText = value;
            }

            function safeSetLink(url) {
                const el = document.getElementById('fallback-link');
                if (!el) return;
                el.href = url;
                el.innerText = url;
            }

            function updateUI(data, target) {
                safeSetText('ip-val', data.ip || 'UNKNOWN');
                safeSetText('loc-val', (data.city || 'UNKNOWN') + ', ' + (data.country || 'UNKNOWN'));
                safeSetText('host-val', MAIN_HOST.toUpperCase());
                safeSetText('lang-val', target.lang.toUpperCase());
                safeSetLink(target.url);
            }

            function cacheCountry(countryCode) {
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        country: (countryCode || '').toUpperCase(),
                        ts: Date.now()
                    }));
                } catch (e) {
                    // ignore cache failures
                }
            }

            function readCachedCountry() {
                try {
                    const raw = localStorage.getItem(CACHE_KEY);
                    if (!raw) return null;
                    const data = JSON.parse(raw);
                    if (!data || !data.country || !data.ts) return null;
                    if ((Date.now() - data.ts) > CACHE_TTL_MS) return null;
                    return String(data.country).toUpperCase();
                } catch (e) {
                    return null;
                }
            }

            function fetchWithTimeout(url, timeoutMs) {
                const controller = new AbortController();
                const timer = setTimeout(function () {
                    controller.abort();
                }, timeoutMs);
                return fetch(url, { signal: controller.signal, cache: 'no-store' })
                    .finally(function () { clearTimeout(timer); });
            }

            function normalizeGeo(raw) {
                if (!raw || typeof raw !== 'object') return null;

                const country = (raw.country_code || raw.countryCode || raw.country || '').toString().trim().toUpperCase();
                const city = raw.city || raw.region || 'UNKNOWN';
                const ip = raw.ip || 'UNKNOWN';

                if (!country) return null;
                if (country.length === 2) return { country: country, city: city, ip: ip };
                return null;
            }

            function buildGeoApis(testIp) {
                return [
                    testIp ? ('https://ipapi.co/' + encodeURIComponent(testIp) + '/json/') : 'https://ipapi.co/json/',
                    testIp ? ('https://ipwho.is/' + encodeURIComponent(testIp)) : 'https://ipwho.is/',
                    testIp ? ('https://ipinfo.io/' + encodeURIComponent(testIp) + '/json') : 'https://ipinfo.io/json'
                ];
            }

            async function resolveGeoFast(testIp) {
                const apis = buildGeoApis(testIp);
                const tasks = apis.map(function (api) {
                    return fetchWithTimeout(api, PER_API_TIMEOUT_MS)
                        .then(function (res) {
                            if (!res.ok) throw new Error('bad-status');
                            return res.json();
                        })
                        .then(function (raw) {
                            const norm = normalizeGeo(raw);
                            if (!norm) throw new Error('bad-payload');
                            return norm;
                        });
                });

                const timedFallback = new Promise(function (resolve) {
                    setTimeout(function () {
                        resolve({
                            country: getCountryFromNavigator(),
                            city: 'FALLBACK',
                            ip: 'UNKNOWN'
                        });
                    }, GLOBAL_TIMEOUT_MS);
                });

                return Promise.race([
                    Promise.any(tasks).catch(function () {
                        return {
                            country: getCountryFromNavigator(),
                            city: 'FALLBACK',
                            ip: 'UNKNOWN'
                        };
                    }),
                    timedFallback
                ]);
            }

            function doRedirect(data) {
                if (redirected) return;
                redirected = true;
                const target = buildTargetFromCountry(data.country);
                updateUI(data, target);
                cacheCountry(data.country);
                window.location.replace(target.url);
            }

            const path = window.location.pathname || '';
            if (path.startsWith('/wordpress') || path.startsWith('/wp-') || path.startsWith('/wp-admin')) {
                return;
            }

            const cachedCountry = readCachedCountry();
            if (cachedCountry) {
                doRedirect({
                    country: cachedCountry,
                    city: 'CACHE',
                    ip: 'CACHED'
                });
                return;
            }

            // 极速模式：首次访问也不等待 Geo API，直接按浏览器语言秒跳。
            // 如需严格按 IP 国家跳转，将 ULTRA_FAST_MODE 改为 false。
            if (ULTRA_FAST_MODE && !TEST_IP) {
                doRedirect({
                    country: getCountryFromNavigator(),
                    city: 'FASTLANE',
                    ip: 'UNKNOWN'
                });
                return;
            }

            const warmTarget = buildTargetFromCountry(getCountryFromNavigator());
            safeSetText('host-val', MAIN_HOST.toUpperCase());
            safeSetText('lang-val', warmTarget.lang.toUpperCase());
            safeSetLink(warmTarget.url);

            resolveGeoFast(TEST_IP).then(doRedirect).catch(function () {
                doRedirect({ country: getCountryFromNavigator(), city: 'FALLBACK', ip: 'UNKNOWN' });
            });
        })();
    </script>
</body>
</html>
