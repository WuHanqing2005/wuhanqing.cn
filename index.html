<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Redirect</title>

<!-- ⚡ 预解析 + 预连接（关键加速） -->
<link rel="dns-prefetch" href="//wuhanqing.cn">
<link rel="preconnect" href="https://wuhanqing.cn" crossorigin>

<style>
:root{
  --fg:#fff;
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  color:var(--fg);
  font-family:"Arial Black",sans-serif;
}

/* ===== 背景 ===== */
.bg{
  position:fixed;
  inset:0;
  background:url("https://cdn.hk01.com/di/media/images/283787/org/2f557ce626504215f36f88c96c2bf8a8.jpg/0ZvRzxnRiEiBKP_6X_y9nc37AeDR_c-obsw2qW7MNqk")
    center/cover no-repeat;

  filter: blur(6px) brightness(.55);
  transform: scale(1.05);
}

/* 渐变遮罩 */
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,
    rgba(0,0,0,.25),
    rgba(0,0,0,.75));
}

/* UI */
.gateway{
  position:relative;
  z-index:2;
  height:100%;
  display:grid;
  place-items:center;
}

/* 扫描线 */
.gateway::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.03) 0,
    rgba(255,255,255,.03) 1px,
    transparent 1px,
    transparent 3px
  );
  opacity:.2;
}

/* 呼吸光 */
.gateway::after{
  content:"";
  position:absolute;
  inset:-20%;
  background:radial-gradient(circle, rgba(120,180,255,.08), transparent 60%);
  animation:breath 6s ease-in-out infinite;
}

@keyframes breath{
  0%,100%{transform:scale(1);opacity:.3;}
  50%{transform:scale(1.05);opacity:.6;}
}

/* 内容 */
.hero{
  text-align:center;
  letter-spacing:.08em;
  text-transform:uppercase;
}

h1{
  margin:0;
  font-size:clamp(34px,7vw,88px);
  text-shadow:
    0 0 10px rgba(255,255,255,.4),
    0 0 40px rgba(120,180,255,.25);
}

p{
  margin:12px 0 0;
  font-size:clamp(20px,3vw,40px);
  opacity:.9;
}

/* ===== 光标（永久闪烁） ===== */
.caret{
  display:inline-block;
  width:.6ch;
  border-right:3px solid #fff;
  margin-left:6px;
  animation:blink .6s step-end infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<main class="gateway">
  <div class="hero">
    <h1>
      <span id="h1"></span><span class="caret"></span>
    </h1>
    <p>
      <span id="p"></span><span class="caret"></span>
    </p>
  </div>
</main>

<script>
/* =========================
   ⚡ 语言判断（同步毫秒级）
========================= */

const base = "https://wuhanqing.cn/wordpress/";
const langs = navigator.languages || [navigator.language || "en"];

let target = base + "en/"; // 默认英文

for(let l of langs){
  l = l.toLowerCase();

  if(l.startsWith("zh")){
    target = base;
    break;
  }
  if(l.startsWith("ko")){
    target = base + "ko/";
    break;
  }
  if(l.startsWith("ja")){
    target = base + "ja/";
    break;
  }
  if(l.startsWith("de")){
    target = base + "de/";
    break;
  }
}

/* =========================
   🚀 下一帧跳转（关键优化）
========================= */
requestAnimationFrame(()=>{
  location.replace(target);
});

/* =========================
   ✍️ 打字（不影响跳转）
========================= */

function type(el,text,speed){
  let i=0;
  (function tick(){
    el.textContent = text.slice(0,i++);
    if(i<=text.length){
      setTimeout(tick, speed + Math.random()*8);
    }
  })();
}

type(document.getElementById("h1"),"HI, I'M WUHANQING",18);
setTimeout(()=>{
  type(document.getElementById("p"),"WELCOME TO MY WEBSITE",16);
},120);

</script>

</body>
</html>
