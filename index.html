<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmic Opening Sequence</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

canvas{
  position:fixed;
  inset:0;
}

/* UI */
.ui{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  z-index:5;
  font-family:Arial Black;
  color:white;
  text-align:center;
  letter-spacing:0.14em;
  text-transform:uppercase;
  text-shadow:
    0 0 30px rgba(255,80,255,0.7),
    0 0 120px rgba(255,255,255,0.2);
}

h1{font-size:clamp(28px,6vw,72px);margin:0;}
p{opacity:.85}

.vignette{
  position:fixed;
  inset:0;
  z-index:4;
  background:radial-gradient(circle at center,
    transparent 25%,
    rgba(0,0,0,0.95) 100%);
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="vignette"></div>

<div class="ui">
  <div>
    <h1 id="h1"></h1>
    <p id="p"></p>
  </div>
</div>

<script>
/* ⚡ FAST REDIRECT */
const target="https://wuhanqing.cn/wordpress/";
setTimeout(()=>location.replace(target),1100);

/* typing */
function type(el,text,speed=25){
  let i=0;
  const t=setInterval(()=>{
    el.textContent=text.slice(0,i++);
    if(i>text.length) clearInterval(t);
  },speed);
}

type(h1,"HI, I'M WUHANQING");
setTimeout(()=>type(p,"WELCOME TO MY WEBSITE"),200);

/* =========================
   🌌 ENGINE
========================= */

const c=document.getElementById("c");
const ctx=c.getContext("2d");

let w,h;
function resize(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const cx=()=>w/2;
const cy=()=>h/2;

/* =========================
   🌠 STAR DEPTH FIELD
========================= */

const stars = Array.from({length:800},()=>({
  x:(Math.random()-0.5)*w,
  y:(Math.random()-0.5)*h,
  z:Math.random()*900
}));

/* =========================
   🌫️ NEBULA LAYER
========================= */

const fog = Array.from({length:120},()=>({
  x:Math.random()*w,
  y:Math.random()*h,
  a:Math.random()*0.35
}));

/* =========================
   🌠 CINEMATIC COMET SYSTEM
========================= */

/*
👉 核心改动：
不是随机飞
而是“导演轨迹”
*/

const comets=[];

function spawnComet(){

  const startX = w*1.2;   // 右上外
  const startY = -200;

  const endX = -200;      // 左下外
  const endY = h*1.2;

  comets.push({

    t:0,

    /* 贝塞尔控制点（制造弧线） */
    x0:startX,
    y0:startY,

    cx:w*0.5 + (Math.random()*200-100),
    cy:h*0.2,

    x1:endX,
    y1:endY,

    z:900
  });
}

/* 稀疏电影级节奏 */
setInterval(spawnComet,1600);

/* =========================
   🌌 RENDER LOOP
========================= */

let t=0;

function bezier(p0,p1,p2,t){
  return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2;
}

function draw(){

  ctx.fillStyle="rgba(0,0,0,0.22)";
  ctx.fillRect(0,0,w,h);

  t+=0.002;

  /* ================= NEBULA ================= */

  for(let f of fog){
    ctx.fillStyle=`rgba(255,80,255,${f.a})`;
    ctx.beginPath();
    ctx.arc(f.x,f.y,2,0,Math.PI*2);
    ctx.fill();
  }

  /* ================= STAR FIELD ================= */

  for(let s of stars){

    const dx=s.x;
    const dy=s.y;
    const dist=Math.sqrt(dx*dx+dy*dy)+0.0001;

    const force=0.002;

    const ang=Math.atan2(dy,dx);

    s.x -= Math.cos(ang)*force*dist;
    s.y -= Math.sin(ang)*force*dist;

    const k=900/(s.z+1);

    const x=cx()+s.x*k;
    const y=cy()+s.y*k;

    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.beginPath();
    ctx.arc(x,y,1.2,0,Math.PI*2);
    ctx.fill();

    s.z -= 0.4;
    if(s.z<1) s.z=900;
  }

  /* ================= BLACK HOLE ================= */

  const g=ctx.createRadialGradient(cx(),cy(),0,cx(),cy(),320);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(0.3,"rgba(255,0,255,0.12)");
  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(cx(),cy(),300,0,Math.PI*2);
  ctx.fill();

  /* ================= CINEMATIC COMETS ================= */

  for(let cmt of comets){

    cmt.t += 0.008;

    if(cmt.t>1) continue;

    /* 贝塞尔轨迹（关键） */
    const x = bezier(cmt.x0,cmt.cx,cmt.x1,cmt.t);
    const y = bezier(cmt.y0,cmt.cy,cmt.y1,cmt.t);

    /* 进入镜头的Z变化 */
    const z = cmt.z * (1-cmt.t);

    const size = (1-cmt.t)*14;

    /* ===== HEAD GLOW ===== */
    const glow = ctx.createRadialGradient(x,y,0,x,y,60);

    glow.addColorStop(0,"rgba(255,220,255,1)");
    glow.addColorStop(0.2,"rgba(255,80,255,0.6)");
    glow.addColorStop(1,"transparent");

    ctx.fillStyle=glow;
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();

    /* ===== LONG TRAIL (电影拖尾) ===== */
    for(let i=0;i<40;i++){

      const tt = cmt.t - i*0.01;
      if(tt<0) break;

      const tx = bezier(cmt.x0,cmt.cx,cmt.x1,tt);
      const ty = bezier(cmt.y0,cmt.cy,cmt.y1,tt);

      ctx.fillStyle=`rgba(255,100,255,${1-i/40})`;

      ctx.beginPath();
      ctx.arc(tx,ty,size*(1-i/40),0,Math.PI*2);
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
