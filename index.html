<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirect</title>

<style>
/* =========================
   🌌 基础主题（高对比暗黑）
========================= */
:root{
    --bg:#020203;
    --fg:#ffffff;
    --muted:rgba(255,255,255,.78);
    --glow:rgba(120,180,255,.18);
}

html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    overflow:hidden;
    color:var(--fg);
    font-family:"Arial Black",sans-serif;
}

/* =========================
   🌌 背景层（轻科技感）
========================= */
.gateway{
    height:100%;
    display:grid;
    place-items:center;
    position:relative;

    background:
        radial-gradient(circle at 50% 50%, rgba(120,180,255,0.10), transparent 55%),
        radial-gradient(circle at 20% 80%, rgba(255,80,255,0.06), transparent 60%),
        #020203;
}

/* 微弱呼吸光（不耗性能） */
.gateway::after{
    content:"";
    position:absolute;
    inset:-20%;
    background:radial-gradient(circle, rgba(255,255,255,0.06), transparent 60%);
    animation:breath 6s ease-in-out infinite;
    pointer-events:none;
}

@keyframes breath{
    0%,100%{transform:scale(1);opacity:.35;}
    50%{transform:scale(1.04);opacity:.6;}
}

/* =========================
   🌌 扫描线（极轻）
========================= */
.gateway::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    opacity:.2;
}

/* =========================
   🌌 UI主体
========================= */
.hero{
    text-align:center;
    text-transform:uppercase;
    letter-spacing:.08em;

    padding:5vmin;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
        0 0 0 1px rgba(120,180,255,.12) inset,
        0 0 60px rgba(120,180,255,.08),
        0 0 120px rgba(255,80,255,.04);
}

/* 标题 */
h1{
    margin:0;
    font-size:clamp(34px,7vw,88px);
    line-height:.95;

    text-shadow:
        0 0 10px rgba(255,255,255,.25),
        0 0 40px rgba(120,180,255,.15);
}

/* 副标题 */
p{
    margin:14px 0 0;
    font-size:clamp(20px,3vw,40px);
    font-weight:800;
    color:var(--muted);
}

/* =========================
   ✍️ 光标（真实闪烁）
========================= */
.caret{
    display:inline-block;
    width:0.6ch;
    border-right:2px solid #fff;
    margin-left:6px;
    transform:translateY(2px);

    animation:blink .7s step-end infinite;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.6));
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<main class="gateway">
    <section class="hero">
        <h1>
            <span id="h1"></span><span id="c1" class="caret"></span>
        </h1>

        <p>
            <span id="p"></span><span id="c2" class="caret"></span>
        </p>
    </section>
</main>

<script>
/* =========================
   ⚡ 超快跳转（核心性能）
========================= */
const target = "https://wuhanqing.cn/wordpress/";

/* 你可以改这个：越小越快 */
const REDIRECT_DELAY = 220;

setTimeout(() => {
    location.replace(target);
}, REDIRECT_DELAY);

/* =========================
   ✍️ 可调打字系统（重点）
========================= */

/*
   👉 调这里控制速度：
   20 = 快
   28 = 推荐（电影感）
   40 = 慢
*/
const TYPE_SPEED_H1 = 26;
const TYPE_SPEED_P  = 22;

function type(el, text, speed, cb){
    let i = 0;

    function tick(){
        el.textContent = text.slice(0, i++);
        if(i <= text.length){
            setTimeout(tick, speed);
        }else{
            cb && cb();
        }
    }

    tick();
}

/* =========================
   🚀 启动
========================= */
document.addEventListener("DOMContentLoaded", () => {

    const h1 = document.getElementById("h1");
    const p  = document.getElementById("p");
    const c1 = document.getElementById("c1");
    const c2 = document.getElementById("c2");

    h1.textContent = "";
    p.textContent  = "";

    c2.style.display = "none";

    /* 第一行 */
    type(h1, "HI, I'M WUHANQING", TYPE_SPEED_H1, () => {

        c1.style.display = "none";
        c2.style.display = "inline-block";

        /* 第二行稍微延迟一点更高级 */
        setTimeout(() => {
            type(p, "WELCOME TO MY WEBSITE", TYPE_SPEED_P);
        }, 120);
    });

});
</script>

</body>
</html>
