<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Routing Service | Cyber Security</title>
    <style>
        :root {
            /* 高级暗色调配色 */
            --bg-dark: #050a18;
            --glass-bg: rgba(10, 20, 40, 0.7);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-main: #e0e6ed;
            --accent-green: #00ffaa;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; /* 科技感字体 */
            background: radial-gradient(circle at center, #102a43 0%, #050a18 100%);
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        /* 动态科技背景光晕 */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(157, 80, 187, 0.05) 0%, transparent 50%);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-25%, -25%); }
            100% { transform: translate(0%, 0%); }
        }

        .glass-panel {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 50px;
            width: 90%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* 扫描线效果 */
        .glass-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-blue);
            border-right: 2px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        h2 { 
            margin: 0; 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .status-msg { opacity: 0.6; font-size: 13px; margin-top: 10px; }

        .info-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dotted rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 25px;
            margin: 30px 0;
            text-align: left;
        }

        .info-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-size: 13px;
        }

        .label { color: rgba(255, 255, 255, 0.4); text-transform: uppercase; }
        .value { color: var(--accent-green); text-shadow: 0 0 5px rgba(0, 255, 170, 0.3); }

        .footer { font-size: 11px; color: rgba(255, 255, 255, 0.3); margin-top: 25px; }
        a { color: var(--neon-purple); text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }

    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="loader"></div>
        <h2>Secure Routing</h2>
        <p class="status-msg">Analyzing environment and bypassing nodes...</p>
        
        <div class="info-card">
            <div class="info-item"><span class="label">User IP:</span><span class="value" id="ip-val">FETCHING...</span></div>
            <div class="info-item"><span class="label">Geo Loc:</span><span class="value" id="loc-val">LOCATING...</span></div>
            <div class="info-item"><span class="label">Gateway:</span><span class="value" id="host-val">CALCULATING...</span></div>
            <div class="info-item"><span class="label">Standard:</span><span class="value" id="lang-val">MATCHING...</span></div>
        </div>

        <div class="footer">
            UPLINK TO: <a id="fallback-link" href="#">INITIALIZING...</a>
        </div>
    </div>

    <script>
        (function () {
            // 固定跳转到正式域名，避免本地调试域名(127.0.0.1)被拼进目标地址
            const MAIN_HOST = 'wuhanqing.cn';

            // 测试用 IP：留空 '' 使用访问者真实 IP；填入后可模拟该 IP 所在国家
            // 下面给你 10 个不同国家/地区示例（用于手动测试）:
            // 中国大陆(CN): 123.125.71.38 -> https://wuhanqing.cn/wordpress
            // 中国香港(HK): 203.160.80.255 -> https://wuhanqing.cn/wordpress
            // 中国台湾(TW): 1.160.0.0 -> https://wuhanqing.cn/wordpress
            // 日本(JP): 106.187.46.0 -> https://wuhanqing.cn/wordpress/?lang=ja
            // 韩国(KR): 211.234.229.0 -> https://wuhanqing.cn/wordpress/?lang=ko
            // 德国(DE): 176.9.0.0 -> https://wuhanqing.cn/wordpress/?lang=de
            // 奥地利(AT): 37.252.224.0 -> https://wuhanqing.cn/wordpress/?lang=de
            // 瑞士(CH): 146.159.0.0 -> https://wuhanqing.cn/wordpress/?lang=de
            // 美国(US): 161.123.0.0 -> https://wuhanqing.cn/wordpress/?lang=en
            // 英国(GB): 25.0.0.0 -> https://wuhanqing.cn/wordpress/?lang=en
            const TEST_IP = '';

            function getLangFromCountry(countryCode) {
                const code = (countryCode || '').toUpperCase();
                if (['CN', 'HK', 'MO', 'TW'].includes(code)) return 'zh';
                if (['KR', 'KP'].includes(code)) return 'ko';
                if (code === 'JP') return 'ja';
                if (['DE', 'AT', 'CH'].includes(code)) return 'de';
                return 'en';
            }

            function buildTargetFromCountry(countryCode) {
                const lang = getLangFromCountry(countryCode);
                let url = 'https://' + MAIN_HOST + '/wordpress';
                if (lang !== 'zh') {
                    url += '/?lang=' + encodeURIComponent(lang);
                }
                return { url, lang };
            }

            function updateUI(data, target) {
                document.getElementById('ip-val').innerText = data.ip || 'UNKNOWN';
                document.getElementById('loc-val').innerText = (data.city || 'UNKNOWN') + ', ' + (data.country || 'UNKNOWN');
                document.getElementById('host-val').innerText = MAIN_HOST.toUpperCase();
                document.getElementById('lang-val').innerText = target.lang.toUpperCase();

                const link = document.getElementById('fallback-link');
                link.href = target.url;
                link.innerText = target.url;
            }

            function fetchWithTimeout(url, timeoutMs) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);
                return fetch(url, { signal: controller.signal })
                    .finally(() => clearTimeout(timer));
            }

            function normalizeGeo(raw) {
                if (!raw || typeof raw !== 'object') return null;

                // 兼容多个常见接口返回格式
                const country = (raw.country_code || raw.countryCode || raw.country || '').toString().toUpperCase();
                const city = raw.city || raw.region || 'UNKNOWN';
                const ip = raw.ip || 'UNKNOWN';

                if (!country || country.length < 2) return null;
                return { country, city, ip };
            }

            async function resolveGeoByIp(testIp) {
                // 多接口串行兜底，避免单个接口不可用导致卡住
                const apis = [
                    testIp ? ('https://ipapi.co/' + encodeURIComponent(testIp) + '/json/') : 'https://ipapi.co/json/',
                    testIp ? ('https://ipwho.is/' + encodeURIComponent(testIp)) : 'https://ipwho.is/',
                    testIp ? ('https://ipinfo.io/' + encodeURIComponent(testIp) + '/json') : 'https://ipinfo.io/json'
                ];

                for (let i = 0; i < apis.length; i++) {
                    try {
                        const res = await fetchWithTimeout(apis[i], 1800);
                        if (!res.ok) continue;
                        const data = await res.json();
                        const norm = normalizeGeo(data);
                        if (norm) return norm;
                    } catch (e) {
                        // ignore and try next API
                    }
                }

                return {
                    country: 'US',
                    city: 'FALLBACK',
                    ip: 'UNKNOWN'
                };
            }

            function doRedirect(data) {
                const target = buildTargetFromCountry(data.country);
                updateUI(data, target);
                window.location.replace(target.url);
            }

            // 防止在 WordPress 内部路径继续重定向
            const path = window.location.pathname || '';
            if (path.startsWith('/wordpress') || path.startsWith('/wp-') || path.startsWith('/wp-admin')) {
                return;
            }

            // 显示处理中状态
            const link = document.getElementById('fallback-link');
            link.innerText = 'CHECKING IP...';

            resolveGeoByIp(TEST_IP).then(doRedirect).catch(() => {
                doRedirect({ country: 'US', city: 'FALLBACK', ip: 'UNKNOWN' });
            });
        })();
    </script>
</body>
</html>
