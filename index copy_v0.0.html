<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <link rel="dns-prefetch" href="//ipwho.is">
    <link rel="dns-prefetch" href="//ipapi.co">
    <link rel="preconnect" href="https://ipwho.is" crossorigin>
    <link rel="preconnect" href="https://ipapi.co" crossorigin>
    <title>Wuhanqing Gateway</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --fg: #fff;
            --dim: rgba(255, 255, 255, 0.92);
            --line: rgba(255, 255, 255, 0.26);
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            font-family: "Arial Black", "Segoe UI", sans-serif;
        }

        .wrap {
            height: 100%;
            display: grid;
            place-items: center;
            position: relative;
            isolation: isolate;
        }

        .wrap::before,
        .wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .wrap::before {
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.045) 0,
                rgba(255, 255, 255, 0.045) 1px,
                transparent 1px,
                transparent 3px
            );
            opacity: 0.34;
        }

        .wrap::after {
            background:
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2), transparent 56%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08), transparent 72%);
        }

        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6vmin;
            border: 1px solid var(--line);
            background: rgba(0, 0, 0, 0.42);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 0 70px rgba(255, 255, 255, 0.09);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(34px, 7vw, 86px);
            line-height: 0.95;
            animation: flash 820ms ease-in-out infinite alternate;
            color: #fff;
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.35),
                0 0 30px rgba(255, 255, 255, 0.24);
        }

        .hero p {
            margin: 14px 0 0;
            font-size: clamp(20px, 3.2vw, 36px);
            color: var(--dim);
            letter-spacing: 0.12em;
            font-weight: 800;
            text-shadow:
                0 0 6px rgba(255, 255, 255, 0.25),
                0 0 22px rgba(255, 255, 255, 0.2);
        }

        @keyframes flash {
            0% { filter: brightness(0.98) contrast(1.03); }
            100% { filter: brightness(1.09) contrast(1.12); }
        }

        .type-line {
            display: inline-block;
            white-space: nowrap;
        }

        .caret {
            display: inline-block;
            width: 0.5ch;
            margin-left: 0.15ch;
            border-right: 2px solid var(--fg);
            vertical-align: -0.06em;
            animation: blink 620ms step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
    <script>
        (function () {
            // TEST_IP 填写位置：将下面空字符串改为你要测试的 IP，例如 '8.8.8.8'。
            // 留空 '' 表示使用访问者真实公网 IP。
            // 测试样例（10个国家/地区，供快速联调；具体识别结果以 Geo API 数据库为准）：
            // 1) 中国大陆 CN: 223.5.5.5
            // 2) 中国大陆 CN: 114.114.114.114
            // 3) 中国香港 HK: 203.80.96.10
            // 4) 中国台湾 TW: 168.95.1.1
            // 5) 韩国 KR: 168.126.63.1
            // 6) 日本 JP: 202.12.27.33
            // 7) 德国 DE: 194.25.2.129
            // 8) 英国 UK: 212.58.246.79
            // 9) 法国 FR: 51.158.111.242
            // 10) 澳大利亚 AU: 139.130.4.5
            var TEST_IP = '';
            var MAINLAND_HOST = 'https://wuhanqing.cn';
            var GLOBAL_HOST = 'https://global.wuhanqing.cn';
            var API_TIMEOUT_MS = 320;
            var HARD_DEADLINE_MS = 760;
            var MIN_SPLASH_MS = 70;
            var CACHE_KEY = 'wq_geo_country_v1';
            var CACHE_TTL_MS = 6 * 60 * 60 * 1000;
            var redirected = false;
            var bootTs = Date.now();

            function languageFromCountry(countryCode) {
                var cc = String(countryCode || '').toUpperCase();
                if (cc === 'CN' || cc === 'HK' || cc === 'MO' || cc === 'TW') return 'zh';
                if (cc === 'KR' || cc === 'KP') return 'ko';
                if (cc === 'JP') return 'ja';
                if (cc === 'DE' || cc === 'AT' || cc === 'CH') return 'de';
                return 'en';
            }

            function hostFromCountry(countryCode) {
                return String(countryCode || '').toUpperCase() === 'CN' ? MAINLAND_HOST : GLOBAL_HOST;
            }

            function buildTargetByCountry(countryCode) {
                var lang = languageFromCountry(countryCode);
                var host = hostFromCountry(countryCode);
                return host + '/wordpress/?lang=' + encodeURIComponent(lang);
            }

            function fallbackTarget() {
                // 1秒兜底无法拿到IP结果时，默认全球英文站，确保快速可达。
                return GLOBAL_HOST + '/wordpress/?lang=en';
            }

            function redirectTo(url) {
                if (redirected) return;
                redirected = true;
                if (window.location.href === url) return;
                var elapsed = Date.now() - bootTs;
                var wait = MIN_SPLASH_MS - elapsed;
                if (wait > 0) {
                    setTimeout(function () {
                        window.location.replace(url);
                    }, wait);
                    return;
                }
                window.location.replace(url);
            }

            function fetchJSON(url, timeoutMs) {
                var controller = new AbortController();
                var timer = setTimeout(function () { controller.abort(); }, timeoutMs);
                return fetch(url, {
                    method: 'GET',
                    signal: controller.signal,
                    cache: 'no-store',
                    mode: 'cors',
                    credentials: 'omit'
                }).then(function (res) {
                    if (!res.ok) throw new Error('HTTP_' + res.status);
                    return res.json();
                }).finally(function () {
                    clearTimeout(timer);
                });
            }

            function readCachedCountry() {
                if (TEST_IP) return '';
                try {
                    var raw = localStorage.getItem(CACHE_KEY);
                    if (!raw) return '';
                    var obj = JSON.parse(raw);
                    if (!obj || !obj.country || !obj.ts) return '';
                    if (Date.now() - Number(obj.ts) > CACHE_TTL_MS) return '';
                    return String(obj.country).toUpperCase();
                } catch (e) {
                    return '';
                }
            }

            function cacheCountry(countryCode) {
                if (TEST_IP) return;
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        country: String(countryCode || '').toUpperCase(),
                        ts: Date.now()
                    }));
                } catch (e) {
                    // ignore cache failures
                }
            }

            function normalizeCountryCode(raw) {
                if (!raw || typeof raw !== 'object') return '';
                var cc = raw.country_code || raw.countryCode || raw.country;
                if (!cc) return '';
                cc = String(cc).toUpperCase().trim();
                return cc.length === 2 ? cc : '';
            }

            function buildGeoTasks(testIp) {
                var ipPart = testIp ? (encodeURIComponent(testIp) + '/') : '';
                var ipwho = fetchJSON('https://ipwho.is/' + (testIp ? encodeURIComponent(testIp) : ''), API_TIMEOUT_MS)
                    .then(function (raw) {
                        if (raw && raw.success === false) throw new Error('IPWHO_FAIL');
                        var cc = normalizeCountryCode(raw);
                        if (!cc) throw new Error('BAD_IPWHO');
                        return cc;
                    });

                var ipapi = fetchJSON('https://ipapi.co/' + ipPart + 'json/', API_TIMEOUT_MS)
                    .then(function (raw) {
                        var cc = normalizeCountryCode(raw);
                        if (!cc) throw new Error('BAD_IPAPI');
                        return cc;
                    });

                return [ipwho, ipapi];
            }

            setTimeout(function () {
                redirectTo(fallbackTarget());
            }, HARD_DEADLINE_MS);

            var cachedCountry = readCachedCountry();
            if (cachedCountry) {
                redirectTo(buildTargetByCountry(cachedCountry));
                return;
            }

            Promise.any(buildGeoTasks(TEST_IP))
                .then(function (countryCode) {
                    cacheCountry(countryCode);
                    redirectTo(buildTargetByCountry(countryCode));
                })
                .catch(function () {
                    redirectTo(fallbackTarget());
                });
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=https://wuhanqing.cn/">
    </noscript>
</head>
<body>
    <main class="wrap" aria-label="Redirecting">
        <section class="hero">
            <h1><span id="type-h1" class="type-line">HI, I'M WUHANQING</span><span id="caret-h1" class="caret"></span></h1>
            <p><span id="type-p" class="type-line">WELCOME TO MY WEBSITE</span><span id="caret-p" class="caret" style="display:none"></span></p>
        </section>
    </main>
    <script>
        (function () {
            var line1 = "HI, I'M WUHANQING";
            var line2 = 'WELCOME TO MY WEBSITE';
            // 打字速度修改位置（单位：毫秒，数值越大打字越慢）
            var TYPE_SPEED_H1_MS = 30;
            var TYPE_SPEED_P_MS = 26;

            var h1 = document.getElementById('type-h1');
            var p = document.getElementById('type-p');
            var c1 = document.getElementById('caret-h1');
            var c2 = document.getElementById('caret-p');

            if (h1) h1.textContent = '';
            if (p) p.textContent = '';

            function typeText(el, text, stepMs, done) {
                var i = 0;
                function tick() {
                    if (!el) return;
                    el.textContent = text.slice(0, i);
                    i += 1;
                    if (i <= text.length) {
                        setTimeout(tick, stepMs);
                    } else if (done) {
                        done();
                    }
                }
                tick();
            }

            typeText(h1, line1, TYPE_SPEED_H1_MS, function () {
                if (c1) c1.style.display = 'none';
                if (c2) c2.style.display = 'inline-block';
                typeText(p, line2, TYPE_SPEED_P_MS, function () {
                    if (c2) c2.style.display = 'none';
                });
            });
        })();
    </script>
</body>
</html>
